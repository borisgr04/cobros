@if (!isPublicRoute()) {
  <!-- Sidebar Navigation (Desktop/Tablet) -->
  <app-sidebar-navigation />
}

<!-- Main Content Area -->
<main
  class="main-content"
  [class.sidebar-collapsed]="!isPublicRoute() && sidebarState() === 'collapsed'"
  [class.sidebar-expanded]="!isPublicRoute() && sidebarState() === 'expanded'"
  [class.public-layout]="isPublicRoute()">
  <router-outlet />
</main>

@if (!isPublicRoute()) {
  <!-- Bottom Navigation (Mobile) -->
  <app-bottom-navigation />
}
