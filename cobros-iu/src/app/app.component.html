@if (showNav()) {
  <!-- Sidebar Navigation (Desktop/Tablet) -->
  <app-sidebar-navigation />
}

<!-- Main Content Area -->
<main
  class="main-content"
  [class.sidebar-collapsed]="showNav() && sidebarState() === 'collapsed'"
  [class.sidebar-expanded]="showNav() && sidebarState() === 'expanded'"
  [class.public-layout]="!showNav()">
  <router-outlet />
</main>

@if (showNav()) {
  <!-- Bottom Navigation (Mobile) -->
  <app-bottom-navigation />
}
