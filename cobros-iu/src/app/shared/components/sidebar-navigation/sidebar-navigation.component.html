<aside class="sidebar" [class.collapsed]="sidebarState() === 'collapsed'" [class.expanded]="sidebarState() === 'expanded'">
  <!-- Sidebar Header -->
  <div class="sidebar-header">
    <button class="sidebar-toggle" (click)="toggleSidebar()" type="button" aria-label="Toggle sidebar">
      <i class="bi bi-list"></i>
    </button>
    <span class="sidebar-brand">Cobros App</span>
  </div>

  <!-- Navigation Items -->
  <nav class="sidebar-nav">
    @for (item of navItems; track item.path) {
      <a 
        [routerLink]="item.path" 
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.path === '/' }"
        class="nav-item" 
        [attr.data-label]="item.label"
        [attr.aria-label]="item.label">
        <i class="nav-icon bi" [ngClass]="item.icon"></i>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    }
  </nav>

  <!-- Usuario + Logout -->
  <div class="sidebar-footer">
    @if (user()) {
      <div class="user-card">
        @if (user()!.fotoUrl) {
          <img [src]="user()!.fotoUrl" [alt]="user()!.nombre" class="user-avatar" referrerpolicy="no-referrer">
        } @else {
          <div class="user-avatar-fallback"><i class="bi bi-person-fill"></i></div>
        }
        <div class="user-info">
          <span class="user-name">{{ user()!.nombre }}</span>
          <span class="user-email">{{ user()!.email }}</span>
        </div>
      </div>
    }
    <a
      routerLink="/perfil"
      routerLinkActive="active"
      class="perfil-btn"
      aria-label="Mi perfil">
      <i class="bi bi-person-circle nav-icon"></i>
      <span class="nav-label">
        Mi perfil
        @if (biometricAvailable() && !biometric.hasRegisteredLocally()) {
          <i class="bi bi-fingerprint biometric-badge" title="Activa Face ID / Huella desde tu perfil"></i>
        }
      </span>
    </a>
    <button class="logout-btn" (click)="logout()" type="button" title="Cerrar sesión" aria-label="Cerrar sesión">
      <i class="bi bi-box-arrow-right"></i>
      <span class="nav-label">Cerrar sesión</span>
    </button>
  </div>
</aside>
