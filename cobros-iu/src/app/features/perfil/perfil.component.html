<div class="container py-4" style="max-width: 640px;">
  <h2 class="mb-4">
    <i class="bi bi-person-circle me-2"></i>Mi perfil
  </h2>

  @if (user(); as u) {
    <div class="card mb-4">
      <div class="card-body d-flex align-items-center gap-3">
        @if (u.fotoUrl) {
          <img [src]="u.fotoUrl" alt="Foto" class="rounded-circle" width="64" height="64">
        } @else {
          <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center"
               style="width:64px;height:64px;font-size:1.8rem;">
            {{ u.nombre.charAt(0).toUpperCase() }}
          </div>
        }
        <div>
          <div class="fw-semibold fs-5">{{ u.nombre }}</div>
          <div class="text-muted">{{ u.email }}</div>
        </div>
      </div>
    </div>
  }

  <app-biometric-registration />
</div>
