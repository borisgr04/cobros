<div class="modal-overlay" [class.visible]="modalAbierto()" (click)="cerrar()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    
    <!-- Header -->
    <div class="modal-header">
      <h2 class="modal-title">
        <i class="bi bi-geo-alt"></i>
        {{ tituloModal() }}
      </h2>
      <button class="btn-close" (click)="cerrar()" [disabled]="procesando()">
        <i class="bi bi-x"></i>
      </button>
    </div>
    
    <!-- Body -->
    <div class="modal-body">
      <form (ngSubmit)="guardar()">
        
        <!-- Campo Nombre -->
        <div class="form-group">
          <label for="nombre" class="form-label">
            Nombre de la Zona <span class="required">*</span>
          </label>
          <input
            type="text"
            id="nombre"
            class="form-control"
            [(ngModel)]="nombre"
            [ngModelOptions]="{standalone: true}"
            [disabled]="procesando()"
            placeholder="Ej: Centro, Norte, Sur, Occidente..."
            required
            minlength="2"
            maxlength="50">
          <small class="form-hint">Mínimo 2 caracteres</small>
        </div>
        
        <!-- Campo Estado -->
        <div class="form-group">
          <label for="estado" class="form-label">
            Estado <span class="required">*</span>
          </label>
          <select
            id="estado"
            class="form-control"
            [(ngModel)]="estado"
            [ngModelOptions]="{standalone: true}"
            [disabled]="procesando()">
            <option value="activo">Activo</option>
            <option value="inactivo">Inactivo</option>
          </select>
          <small class="form-hint">Las zonas inactivas no aparecen en los filtros</small>
        </div>
        
        <!-- Error -->
        @if (error()) {
          <div class="error-message">
            <i class="bi bi-exclamation-triangle-fill"></i>
            {{ error() }}
          </div>
        }
        
      </form>
    </div>
    
    <!-- Footer -->
    <div class="modal-footer">
      <button
        type="button"
        class="btn btn-secondary"
        (click)="cerrar()"
        [disabled]="procesando()">
        <i class="bi bi-x-circle"></i>
        Cancelar
      </button>
      <button
        type="button"
        class="btn btn-primary"
        (click)="guardar()"
        [disabled]="!formularioValido() || procesando()">
        @if (procesando()) {
          <i class="bi bi-hourglass-split"></i>
          Guardando...
        } @else {
          <i class="bi bi-check-circle-fill"></i>
          {{ modo() === 'crear' ? 'Crear Zona' : 'Guardar Cambios' }}
        }
      </button>
    </div>
    
  </div>
</div>
