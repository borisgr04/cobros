<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>CobrApp</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async="" defer=""></script>

  <!-- Eruda mobile debugger — TEMPORAL, remover antes de producción final -->
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1976d2">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="CobrApp">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <style>
    /* ── Splash Screen ── */
    #app-splash {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #f5f5f5;
      color: #0d0d0d;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    @media (prefers-color-scheme: dark) {
      #app-splash {
        background-color: #0d0d0d;
        color: #f5f5f5;
      }
    }

    #app-splash.splash-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .splash-logo {
      width: 120px;
      height: 120px;
      object-fit: contain;
      margin-bottom: 24px;
    }

    .splash-title {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 8px;
    }

    .splash-version {
      font-size: 0.85rem;
      opacity: 0.55;
      margin-bottom: 48px;
    }

    /* Indeterminate progress bar */
    .splash-progress {
      width: min(280px, 70vw);
      height: 4px;
      border-radius: 2px;
      background-color: rgba(61, 90, 254, 0.2);
      overflow: hidden;
    }

    .splash-progress-bar {
      height: 100%;
      width: 40%;
      border-radius: 2px;
      background-color: #3d5afe;
      animation: splash-indeterminate 1.4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes splash-indeterminate {
      0%   { transform: translateX(-100%) scaleX(0.5); }
      50%  { transform: translateX(100%) scaleX(1.2); }
      100% { transform: translateX(250%) scaleX(0.5); }
    }
  </style>
</head>
<body>
  <!-- Splash screen: visible before Angular initialises -->
  <div id="app-splash" role="status" aria-label="Cargando CobrApp…">
    <img class="splash-logo" src="assets/CobrApp.png" alt="CobrApp logo" />
    <span class="splash-title">CobrApp</span>
    <span class="splash-version">v0.0.0</span>
    <div class="splash-progress">
      <div class="splash-progress-bar"></div>
    </div>
  </div>

  <app-root></app-root>
  
  <!-- Bootstrap Bundle with Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <noscript>Please enable JavaScript to continue using this application.</noscript>
</body>
</html>
