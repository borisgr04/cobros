services:
  # ── Frontend Angular (Static Site) ──────────────────────────────────────────
  - type: web
    name: cobrosfront          # debe coincidir con el nombre en el dashboard de Render
    env: static
    rootDir: cobros-iu
    buildCommand: npm ci && npm run build -- --configuration production
    staticPublishPath: dist/cobros-app
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin-allow-popups
